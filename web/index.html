<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <!-- Other meta tags like viewport, apple-touch-icon, etc., can go here -->
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ksync">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>KidSync</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // WARNING: DO NOT MODIFY OR REMOVE THE NEXT LINE!
    // This is required for Flutter web to work correctly in development and production.
    var serviceWorkerVersion = null;
  </script>

  <!-- EARLIEST POSSIBLE HASH CHECK -->
  <script>
    console.log('[DEBUG index.html HEAD SCRIPT] window.location.href:', window.location.href);
    console.log('[DEBUG index.html HEAD SCRIPT] window.location.hash:', window.location.hash);
  </script>
  <!-- END EARLIEST POSSIBLE HASH CHECK -->

  <!-- This script installs service_worker.js to provide PWA functionality to
       application. For more information, see:
       https://developers.google.com/web/fundamentals/primers/service-workers -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('flutter-first-frame', function () {
        navigator.serviceWorker.register('flutter_service_worker.js?v=' + serviceWorkerVersion);
      });
    }
  </script>
  <script>
    // Handle double hash pattern for Supabase authentication
    window.addEventListener('DOMContentLoaded', function() {
      var location = window.location.href;
      if (location.includes('#/set-password#access_token=')) {
        console.log('Detected invite URL with double hash pattern');
        
        // Extract all parts of the auth data
        var authPart = location.split('#/set-password#')[1];
        var params = {};
        
        // Parse all parameters
        authPart.split('&').forEach(function(pair) {
          if (pair.includes('=')) {
            var keyValue = pair.split('=');
            params[keyValue[0]] = keyValue[1];
          }
        });
        
        // Store each parameter separately
        if (params.access_token) {
          window.sessionStorage.setItem('supabase_access_token', params.access_token);
        }
        if (params.refresh_token) {
          window.sessionStorage.setItem('supabase_refresh_token', params.refresh_token);
        }
        if (params.expires_in) {
          window.sessionStorage.setItem('supabase_expires_in', params.expires_in);
        }
        if (params.expires_at) {
          window.sessionStorage.setItem('supabase_expires_at', params.expires_at);
        }
        
        console.log('Stored token components in sessionStorage for Flutter to access');
        
        // Clean up the URL (optional, makes it prettier)
        history.replaceState({}, document.title, location.split('#')[0] + '#/set-password');
      }
    });
  </script>
</head>
<body>
  <!-- SECOND EARLY HASH CHECK - First thing in body -->
  <script>
    console.log('[DEBUG index.html BODY SCRIPT] window.location.href:', window.location.href);
    console.log('[DEBUG index.html BODY SCRIPT] window.location.hash:', window.location.hash);
  </script>
  <!-- END SECOND EARLY HASH CHECK -->

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
