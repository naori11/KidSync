<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">

    <!-- Password Reset Code Interception -->
    <script>
      (function() {
        var url = window.location.href;
        if (url.indexOf('?code=') !== -1 || url.indexOf('&code=') !== -1) {
          console.log('[PASSWORD RESET] Detected code parameter in URL');
          var code = "";
          // Extract code
          if (url.indexOf('?code=') !== -1) {
            code = url.split('?code=')[1];
          } else if (url.indexOf('&code=') !== -1) {
            code = url.split('&code=')[1];
          }
          if (code.indexOf('&') !== -1) {
            code = code.split('&')[0];
          }
          // Store only the code for password reset
          window.sessionStorage.setItem('kidsync_reset_code', code);
          console.log('[PASSWORD RESET] Stored reset code in session storage');
          // Clean URL to prevent Supabase auto-handling
          var baseUrl = window.location.href.split('?')[0];
          window.history.replaceState({}, document.title, baseUrl);
        }
      })();
    </script>

    <!-- Other meta tags -->
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="A new Flutter project.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="ksync">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>KidSync</title>
    <link rel="manifest" href="manifest.json">

    <script>
      var serviceWorkerVersion = null;
    </script>
    <script>
      console.log('[DEBUG index.html HEAD SCRIPT] window.location.href:', window.location.href);
      console.log('[DEBUG index.html HEAD SCRIPT] window.location.hash:', window.location.hash);
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('flutter-first-frame', function () {
          navigator.serviceWorker.register('flutter_service_worker.js?v=' + serviceWorkerVersion);
        });
      }
    </script>

    <!-- Supabase Invite Token Interception -->
    <script>
      // This only runs for invite/access_token links, not password resets.
      window.addEventListener('DOMContentLoaded', function() {
        console.log("Auth helper script running...");
        var location = window.location.href;
        if (location.includes('access_token=')) {
          console.log("Auth URL detected, storing auth parameters");
          try {
            window.sessionStorage.setItem('original_auth_url', location);
            var authParams = {};
            var hashParts = location.includes('#') ? location.split('#') : [];
            for (var i = 0; i < hashParts.length; i++) {
              if (hashParts[i].includes('access_token=')) {
                var paramPart = hashParts[i];
                if (paramPart.startsWith('/set-password')) {
                  paramPart = paramPart.replace('/set-password', '');
                }
                var params = paramPart.split('&');
                for (var j = 0; j < params.length; j++) {
                  var pair = params[j].split('=');
                  if (pair.length === 2) {
                    var key = pair[0];
                    if (key.includes('access_token=')) {
                      key = 'access_token';
                      pair[1] = pair[0].split('access_token=')[1];
                    }
                    authParams[key] = pair[1];
                  }
                }
                break;
              }
            }
            for (var key in authParams) {
              window.sessionStorage.setItem('supabase_' + key, authParams[key]);
            }
            console.log("Auth parameters stored successfully");
          } catch (e) {
            console.error("Error processing auth parameters:", e);
          }
        } else {
          console.log("No auth parameters found in URL");
        }
      });
    </script>
  </head>
  <body>
    <script>
      console.log('[DEBUG index.html BODY SCRIPT] window.location.href:', window.location.href);
      console.log('[DEBUG index.html BODY SCRIPT] window.location.hash:', window.location.hash);
    </script>
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
