<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <!-- Other meta tags like viewport, apple-touch-icon, etc., can go here -->
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ksync">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>KidSync</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // WARNING: DO NOT MODIFY OR REMOVE THE NEXT LINE!
    // This is required for Flutter web to work correctly in development and production.
    var serviceWorkerVersion = null;
  </script>

  <!-- EARLIEST POSSIBLE HASH CHECK -->
  <script>
    console.log('[DEBUG index.html HEAD SCRIPT] window.location.href:', window.location.href);
    console.log('[DEBUG index.html HEAD SCRIPT] window.location.hash:', window.location.hash);
  </script>
  <!-- END EARLIEST POSSIBLE HASH CHECK -->

  <!-- This script installs service_worker.js to provide PWA functionality to
       application. For more information, see:
       https://developers.google.com/web/fundamentals/primers/service-workers -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('flutter-first-frame', function () {
        navigator.serviceWorker.register('flutter_service_worker.js?v=' + serviceWorkerVersion);
      });
    }
  </script>
  <script>
    // Handle authentication token in URL
    window.addEventListener('DOMContentLoaded', function() {
      var location = window.location.href;
      console.log("Processing URL in script:", location);
      
      // Check for access token in different URL formats
      if (location.includes('access_token=')) {
        console.log("Found access_token in URL");
        
        // Parse the token and other parameters
        var params = {};
        var hashParts = location.split('#');
        
        // Process the hash part(s) that contain the token
        if (hashParts.length > 1) {
          var authPart = hashParts[hashParts.length - 1]; // Get the last hash part
          
          // Split into key-value pairs
          authPart.split('&').forEach(function(pair) {
            if (pair.includes('=')) {
              var keyValue = pair.split('=');
              var key = keyValue[0];
              // Handle the case where the key might contain access_token=
              if (key.includes('access_token=')) {
                key = 'access_token';
                keyValue[1] = keyValue[0].split('access_token=')[1];
              }
              params[key] = keyValue[1];
            }
          });
        }
        
        // Store auth parameters in session storage
        if (params.access_token) {
          window.sessionStorage.setItem('supabase_access_token', params.access_token);
          console.log("Stored access token in session storage");
        }
        if (params.refresh_token) {
          window.sessionStorage.setItem('supabase_refresh_token', params.refresh_token);
        }
        if (params.expires_at) {
          window.sessionStorage.setItem('supabase_expires_at', params.expires_at);
        }
        if (params.expires_in) {
          window.sessionStorage.setItem('supabase_expires_in', params.expires_in);
        }
        if (params.type) {
          window.sessionStorage.setItem('supabase_auth_type', params.type);
        }
        
        // Also store the raw URL for debugging
        window.sessionStorage.setItem('original_url', location);
        
        console.log("Auth parameters stored in session storage");
      }
    });
  </script>
</head>
<body>
  <!-- SECOND EARLY HASH CHECK - First thing in body -->
  <script>
    console.log('[DEBUG index.html BODY SCRIPT] window.location.href:', window.location.href);
    console.log('[DEBUG index.html BODY SCRIPT] window.location.hash:', window.location.hash);
  </script>
  <!-- END SECOND EARLY HASH CHECK -->

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
